---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
    inputs:
      pull:
        description: Pull base references before building
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  static:
    name: Static validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Install static analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep shellcheck python3-venv
          python3 -m venv .venv
          .venv/bin/pip install --disable-pip-version-check yamllint==1.38.0
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Run project static checks
        run: ./scripts/static-checks.sh

      - name: Lint Dockerfiles
        env:
          HADOLINT_IMAGE: >-
            docker.io/hadolint/hadolint:v2.14.0-alpine@sha256:7aba693c1442eb31c0b015c129697cb3b6cb7da589d85c7562f9deb435a6657c
        run: |
          dockerfiles=(
            images/controller/Dockerfile
            images/debian/Dockerfile
            images/rhel/Dockerfile
          )
          for dockerfile in "${dockerfiles[@]}"; do
            docker run --rm -i \
              --mount "type=bind,source=$PWD/.hadolint.yaml,target=/.hadolint.yaml,readonly" \
              "$HADOLINT_IMAGE" \
              /bin/hadolint --config /.hadolint.yaml - < "$dockerfile"
          done

  runtime:
    name: ${{ matrix.target }} on ${{ matrix.arch }}
    needs: static
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ubuntu-2404
            contract_target: ubuntu-24.04
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            image: docker.io/cloudsprocket/ansible-node-ubuntu-2404:dev
          - target: debian-13
            contract_target: debian-13
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            image: docker.io/cloudsprocket/ansible-node-debian-13:dev
          - target: rocky-9
            contract_target: rocky-9
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            image: docker.io/cloudsprocket/ansible-node-rocky-9:dev
          - target: rocky-10
            contract_target: rocky-10
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
            image: docker.io/cloudsprocket/ansible-node-rocky-10:dev
          - target: ubuntu-2404
            contract_target: ubuntu-24.04
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            image: docker.io/cloudsprocket/ansible-node-ubuntu-2404:dev
          - target: debian-13
            contract_target: debian-13
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            image: docker.io/cloudsprocket/ansible-node-debian-13:dev
          - target: rocky-9
            contract_target: rocky-9
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            image: docker.io/cloudsprocket/ansible-node-rocky-9:dev
          - target: rocky-10
            contract_target: rocky-10
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
            image: docker.io/cloudsprocket/ansible-node-rocky-10:dev

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Build managed node and contract controller
        env:
          BUILD_PLATFORM: ${{ matrix.platform }}
          BUILD_TARGET: ${{ matrix.target }}
          PULL_BASES: ${{ inputs.pull || false }}
          REVISION: ${{ github.sha }}
          VERSION: dev
        run: |
          export CREATED
          CREATED="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          pull_args=()
          if [[ "$PULL_BASES" == "true" ]]; then
            pull_args+=(--pull)
          fi
          docker buildx bake -f docker-bake.hcl "$BUILD_TARGET" controller --load \
            "${pull_args[@]}" \
            --set "${BUILD_TARGET}.platform=${BUILD_PLATFORM}" \
            --set "controller.platform=${BUILD_PLATFORM}"

      - name: Run SSH, Ansible, idempotency and systemd contracts
        run: ./scripts/test-image.sh "${{ matrix.contract_target }}"

      - name: Scan candidate for fixable high-severity vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library

      - name: Scan controller candidate for fixable high-severity vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: docker.io/cloudsprocket/ansible-controller:dev
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          vuln-type: os,library
